<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <rect width="256" height="256" rx="48" fill="#0D1117"/>
  <!-- pixel art CS monogram, 16px blocks on a 12x12 grid -->
  <g fill="#39FF14">
    <!-- C shape (left half) -->
    <rect x="32" y="80" width="16" height="16"/><rect x="48" y="80" width="16" height="16"/><rect x="64" y="80" width="16" height="16"/>
    <rect x="32" y="96" width="16" height="16"/>
    <rect x="32" y="112" width="16" height="16"/>
    <rect x="32" y="128" width="16" height="16"/>
    <rect x="32" y="144" width="16" height="16"/><rect x="48" y="144" width="16" height="16"/><rect x="64" y="144" width="16" height="16"/>
    <!-- S shape (right half) -->
    <rect x="96" y="80" width="16" height="16"/><rect x="112" y="80" width="16" height="16"/><rect x="128" y="80" width="16" height="16"/>
    <rect x="96" y="96" width="16" height="16"/>
    <rect x="96" y="112" width="16" height="16"/><rect x="112" y="112" width="16" height="16"/><rect x="128" y="112" width="16" height="16"/>
    <rect x="128" y="128" width="16" height="16"/>
    <rect x="96" y="144" width="16" height="16"/><rect x="112" y="144" width="16" height="16"/><rect x="128" y="144" width="16" height="16"/>
  </g>
</svg>
