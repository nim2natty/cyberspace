    <rect x="110" y="86" width="8" height="8"/><rect x="118" y="86" width="8" height="8"/><rect x="126" y="86" width="8" height="8"/>
    <rect x="110" y="94" width="8" height="8"/><rect x="134" y="94" width="8" height="8"/>
    <rect x="110" y="102" width="8" height="8"/><rect x="118" y="102" width="8" height="8"/><rect x="126" y="102" width="8" height="8"/>
    <!-- E  x=150 -->
    <rect x="150" y="70" width="8" height="8"/><rect x="158" y="70" width="8" height="8"/><rect x="166" y="70" width="8" height="8"/><rect x="174" y="70" width="8" height="8"/>
    <rect x="150" y="78" width="8" height="8"/>
    <rect x="150" y="86" width="8" height="8"/><rect x="158" y="86" width="8" height="8"/><rect x="166" y="86" width="8" height="8"/>
    <rect x="150" y="94" width="8" height="8"/>
    <rect x="150" y="102" width="8" height="8"/><rect x="158" y="102" width="8" height="8"/><rect x="166" y="102" width="8" height="8"/><rect x="174" y="102" width="8" height="8"/>
    <!-- R  x=190 -->
