    <!-- P  x=270 -->
    <rect x="270" y="70" width="8" height="8"/><rect x="278" y="70" width="8" height="8"/><rect x="286" y="70" width="8" height="8"/>
    <rect x="270" y="78" width="8" height="8"/><rect x="294" y="78" width="8" height="8"/>
