<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" fill="none" font-family="system-ui,-apple-system,sans-serif">
  <rect width="960" height="320" rx="12" fill="#0D1117"/>

  <!-- ===== ORCHESTRATOR (left) ===== -->
  <g transform="translate(120,160)">
    <rect x="-58" y="-34" width="116" height="68" rx="8" fill="#161B22" stroke="#30363D"/>
    <text x="0" y="-8" text-anchor="middle" fill="#58A6FF" font-size="11" font-weight="700" letter-spacing="1">ORCHESTRATOR</text>
    <text x="0" y="10" text-anchor="middle" fill="#8B949E" font-size="9">delegates tasks</text>
    <text x="0" y="24" text-anchor="middle" fill="#484F58" font-size="8">swarm.delegate()</text>
  </g>

  <!-- ===== connection lines (orchestrator -> agents) ===== -->
  <g stroke="#30363D" stroke-width="1" fill="none">
    <path d="M 178 140 C 230 140 240 50 300 50"/>
    <path d="M 178 150 C 230 150 240 105 300 105"/>
    <path d="M 178 160 C 230 160 240 160 300 160"/>
    <path d="M 178 170 C 230 170 240 215 300 215"/>
    <path d="M 178 180 C 230 180 240 270 300 270"/>
    <path d="M 178 190 C 220 210 240 290 600 290"/>
  </g>
  <!-- arrow markers on lines -->
  <g fill="#30363D"><circle cx="300" cy="50" r="2"/><circle cx="300" cy="105" r="2"/><circle cx="300" cy="160" r="2"/><circle cx="300" cy="215" r="2"/><circle cx="300" cy="270" r="2"/></g>

  <!-- ===== AGENT CARDS (right column) ===== -->
  <!-- Recon -->
  <g transform="translate(310,30)">
    <rect width="300" height="42" rx="6" fill="#161B22" stroke="#00FF9D" stroke-width="1" opacity="0.9"/>
    <text x="12" y="17" fill="#00FF9D" font-size="11" font-weight="700">RECON  📶</text>
    <text x="78" y="17" fill="#8B949E" font-size="9">AirBender — nmap · masscan · aircrack-ng · netdiscover · dig</text>
    <text x="12" y="33" fill="#484F58" font-size="8">chain: ping-sweep → nmap-top → service-detect</text>
  </g>
  <!-- Exploit -->
  <g transform="translate(310,84)">
    <rect width="300" height="42" rx="6" fill="#161B22" stroke="#FF6B6B" stroke-width="1" opacity="0.9"/>
    <text x="12" y="17" fill="#FF6B6B" font-size="11" font-weight="700">EXPLOIT  🐍</text>
    <text x="86" y="17" fill="#8B949E" font-size="9">ShadowDragon — sqlmap · metasploit · john · hydra</text>
    <text x="12" y="33" fill="#484F58" font-size="8">chain: whatweb → searchsploit → msfconsole</text>
  </g>
  <!-- Ghost -->
  <g transform="translate(310,139)">
    <rect width="300" height="42" rx="6" fill="#161B22" stroke="#A855F7" stroke-width="1" opacity="0.9"/>
    <text x="12" y="17" fill="#A855F7" font-size="11" font-weight="700">GHOST  🧊</text>
    <text x="78" y="17" fill="#8B949E" font-size="9">IceBerg — anti-detect · Tor · DoH · canvas/WebGL spoof</text>
    <text x="12" y="33" fill="#484F58" font-size="8">brightside (clearnet) · darkside (onion search via SOCKS5h)</text>
  </g>
  <!-- Hardware -->
  <g transform="translate(310,194)">
    <rect width="300" height="42" rx="6" fill="#161B22" stroke="#FBBF24" stroke-width="1" opacity="0.9"/>
    <text x="12" y="17" fill="#FBBF24" font-size="11" font-weight="700">HARDWARE  🔌</text>
    <text x="100" y="17" fill="#8B949E" font-size="9">StickEm — ESP32 Marauder · FT232 · OpenWrt</text>
    <text x="12" y="33" fill="#484F58" font-size="8">deauth · sniff PMKID · serial console · router SSH</text>
  </g>
  <!-- Smith -->
  <g transform="translate(310,249)">
    <rect width="300" height="42" rx="6" fill="#161B22" stroke="#00D9FF" stroke-width="1" opacity="0.9"/>
    <text x="12" y="17" fill="#00D9FF" font-size="11" font-weight="700">SMITH  👶</text>
    <text x="68" y="17" fill="#8B949E" font-size="9">TrainABaby — datasets · QLoRA · Vast.ai GPU · serve</text>
    <text x="12" y="33" fill="#484F58" font-size="8">train → serve → plug model back as the agent's brain</text>
  </g>

  <!-- ===== Scribe (bottom-right, no tools) ===== -->
  <g transform="translate(640,280)">
    <rect width="290" height="30" rx="6" fill="#161B22" stroke="#6E7681" stroke-width="1" opacity="0.7"/>
    <text x="12" y="19" fill="#C9D1D9" font-size="10" font-weight="700">SCRIBE  📝</text>
    <text x="76" y="19" fill="#6E7681" font-size="9">reads activity log → writes engagement report</text>
  </g>

  <!-- ===== MEMORY layer (bottom bar) ===== -->
  <g transform="translate(640,24)">
    <rect width="290" height="40" rx="6" fill="#161B22" stroke="#30363D" stroke-dasharray="3"/>
    <text x="145" y="17" text-anchor="middle" fill="#8B949E" font-size="10" font-weight="600">MEMORY</text>
    <text x="145" y="32" text-anchor="middle" fill="#484F58" font-size="8">profile · episodes · semantic facts → injected into system prompt</text>
  </g>

  <!-- title -->
  <text x="20" y="36" fill="#C9D1D9" font-size="22" font-weight="700" letter-spacing="-0.5">cyberspace</text>
  <text x="20" y="54" fill="#484F58" font-size="10" font-family="monospace">agentic pentest platform · 5 platforms · 40 tools · any LLM</text>
</svg>
