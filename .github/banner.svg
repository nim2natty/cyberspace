<svg xmlns="http://www.w3.org/2000/svg" width="840" height="260" viewBox="0 0 840 260" fill="none">
  <rect width="840" height="260" fill="#0D1117"/>

  <!-- pixelated CYBERSPACE wordmark. each letter is a 5x7 block grid of squares. -->
  <!-- pixel size = 8px; letter width = 5px(40); gap = 1px(8). starts at x=30 y=70 -->
  <g fill="#39FF14">
    <!-- C  x=30 -->
    <rect x="30" y="70" width="8" height="8"/><rect x="38" y="70" width="8" height="8"/><rect x="46" y="70" width="8" height="8"/>
    <rect x="30" y="78" width="8" height="8"/>
    <rect x="30" y="86" width="8" height="8"/>
    <rect x="30" y="94" width="8" height="8"/>
    <rect x="30" y="102" width="8" height="8"/><rect x="38" y="102" width="8" height="8"/><rect x="46" y="102" width="8" height="8"/>
    <!-- Y  x=78 -->
    <rect x="78" y="70" width="8" height="8"/><rect x="94" y="70" width="8" height="8"/>
    <rect x="86" y="78" width="8" height="8"/>
    <rect x="86" y="86" width="8" height="8"/>
    <rect x="86" y="94" width="8" height="8"/>
    <rect x="86" y="102" width="8" height="8"/>
    <!-- B  x=110 -->
