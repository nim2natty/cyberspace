    <rect x="390" y="70" width="8" height="8"/><rect x="398" y="70" width="8" height="8"/><rect x="406" y="70" width="8" height="8"/><rect x="414" y="70" width="8" height="8"/>
    <rect x="390" y="78" width="8" height="8"/>
    <rect x="390" y="86" width="8" height="8"/><rect x="398" y="86" width="8" height="8"/><rect x="406" y="86" width="8" height="8"/>
    <rect x="390" y="94" width="8" height="8"/>
    <rect x="390" y="102" width="8" height="8"/><rect x="398" y="102" width="8" height="8"/><rect x="406" y="102" width="8" height="8"/><rect x="414" y="102" width="8" height="8"/>

    <!-- subtle blink cursor after the word -->
    <rect x="430" y="70" width="8" height="40" opacity="0.5"/>
