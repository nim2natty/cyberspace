    <rect x="310" y="94" width="8" height="8"/><rect x="326" y="94" width="8" height="8"/>
    <rect x="310" y="102" width="8" height="8"/><rect x="326" y="102" width="8" height="8"/>
    <!-- C  x=350 -->
    <rect x="350" y="70" width="8" height="8"/><rect x="358" y="70" width="8" height="8"/><rect x="366" y="70" width="8" height="8"/>
    <rect x="350" y="78" width="8" height="8"/>
    <rect x="350" y="86" width="8" height="8"/>
    <rect x="350" y="94" width="8" height="8"/>
