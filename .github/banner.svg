    <rect x="190" y="78" width="8" height="8"/><rect x="214" y="78" width="8" height="8"/>
    <rect x="190" y="86" width="8" height="8"/><rect x="198" y="86" width="8" height="8"/><rect x="206" y="86" width="8" height="8"/>
    <rect x="190" y="94" width="8" height="8"/><rect x="214" y="94" width="8" height="8"/>
    <rect x="190" y="102" width="8" height="8"/><rect x="206" y="102" width="8" height="8"/>
