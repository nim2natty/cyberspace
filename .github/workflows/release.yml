name: Build standalone executables
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-24.04, platform: linux, arch: x86_64, gui: true}
          - {os: ubuntu-24.04-arm, platform: linux, arch: arm64, gui: true}
          - {os: macos-15-intel, platform: macos, arch: x86_64, gui: true}
          - {os: macos-14, platform: macos, arch: arm64, gui: true}
          - {os: windows-2025, platform: windows, arch: x86_64, gui: true}
          # Streamlit's pyarrow dependency has no Windows ARM wheel.
          - {os: windows-11-arm, platform: windows, arch: arm64, gui: false}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: python -m pip install --upgrade pip ".[dev,build]"
      - name: Install optional GUI dependencies
        if: matrix.gui
        run: python -m pip install ".[gui]"
      - run: python -m pytest -q
      - run: pyinstaller --clean --noconfirm cyberspace.spec
      - name: Name and checksum artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="cyberspace-${{ matrix.platform }}-${{ matrix.arch }}"
          mv dist/cyberspace "dist/${name}"
          shasum -a 256 "dist/${name}" > "dist/${name}.sha256"
      - name: Name and checksum artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "cyberspace-${{ matrix.platform }}-${{ matrix.arch }}.exe"
          Move-Item dist/cyberspace.exe "dist/$name"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$name").Hash.ToLowerInvariant()
          "$hash  $name" | Set-Content "dist/$name.sha256" -NoNewline
      - uses: actions/upload-artifact@v4
        with:
          name: cyberspace-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/cyberspace-*
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {path: artifacts, merge-multiple: true}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*